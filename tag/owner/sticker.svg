<?xml version="1.0" encoding="UTF-8"?>
<svg width="1080" height="540" viewBox="0 0 1080 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Scan to contact me privately</title>
  <desc id="desc">Printable privacy-preserving contact sticker with QR code and masked number.</desc>
  <defs>
    <linearGradient id="base" x1="62" y1="36" x2="1002" y2="514" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8EEDB"/>
      <stop offset="1" stop-color="#EFDABD"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(164 98) rotate(48.5) scale(280 252)">
      <stop stop-color="#E16E3D" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#E16E3D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(916 438) rotate(180) scale(290 250)">
      <stop stop-color="#AC3A15" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#AC3A15" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="0" y="0" width="1080" height="540" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#5B341F" flood-opacity="0.16"/>
    </filter>
    <style>
      .eyebrow { font: 700 20px 'Arial', sans-serif; letter-spacing: 0.24em; text-transform: uppercase; fill: #8D2C10; }
      .sticker-title { font: 700 48px 'Arial', sans-serif; fill: #12100E; }
      .sticker-subtitle { font: 400 22px 'Arial', sans-serif; fill: #5F554C; }
      .section-label { font: 700 18px 'Arial', sans-serif; letter-spacing: 0.18em; text-transform: uppercase; fill: #8D2C10; }
      .code-label { font: 700 22px 'Arial', sans-serif; fill: #12100E; }
      .hint-label { font: 400 18px 'Arial', sans-serif; fill: #5F554C; }
      .mask-number { font: 700 28px 'Arial', sans-serif; fill: #12100E; }
      .reason-text { font: 700 18px 'Arial', sans-serif; fill: #8D2C10; }
      .reason-pill { fill: #D95F2F; fill-opacity: 0.12; stroke: #8D2C10; stroke-opacity: 0.15; }
      .outline { stroke: #11100E; stroke-opacity: 0.12; }
      .mini-card { fill: #FFFBF3; fill-opacity: 0.72; stroke: #11100E; stroke-opacity: 0.12; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="28" y="28" width="1024" height="484" rx="36" fill="url(#base)" class="outline"/>
  </g>
  <rect x="28" y="28" width="1024" height="484" rx="36" fill="url(#glowA)"/>
  <rect x="28" y="28" width="1024" height="484" rx="36" fill="url(#glowB)"/>

  <path d="M770 28H1016C1035.88 28 1052 44.1177 1052 64V306C978.667 273.333 884.667 223.333 770 156V28Z" fill="#FFFFFF" fill-opacity="0.18"/>
  <path d="M28 418C110 407.333 190 417 268 447C314 464.667 355.333 486.333 392 512H64C44.1177 512 28 495.882 28 476V418Z" fill="#FFFFFF" fill-opacity="0.18"/>

  <text x="56" y="84" class="eyebrow">NGF132-STYLE</text>
  <text x="56" y="154" class="sticker-title">Scan to contact me</text><text x="56" y="194" class="sticker-title">privately</text>
  <text x="56" y="286" class="sticker-subtitle">Call without seeing my</text><text x="56" y="308" class="sticker-subtitle">personal number.</text>

  <g transform="translate(56 450)">
    <text y="0" class="section-label">public masked number</text>
    <text y="42" class="mask-number">09513886363</text>
  </g>

