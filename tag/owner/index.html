<!doctype html>
  <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Scan to contact me privately</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="/assets/styles.css">
    </head>
    <body class="tag-page">
      
    <main class="shell shell-tag">
      <section class="contact-card">
        <p class="eyebrow">Vehicle contact</p>
        <h1>Vehicle Owner</h1>
        <p class="lead">Call without seeing my personal number.</p>
        <a class="button button-primary button-wide" href="tel:09513886363">Call Vehicle Owner privately</a>
        <div class="reason-block">
          <p class="reason-label">Common reasons people scan this</p>
          <ul class="reason-list"><li class="reason-chip">Wrong parking</li><li class="reason-chip">Lights on</li><li class="reason-chip">Vehicle blocking</li><li class="reason-chip">Emergency</li></ul>
        </div>
        <div class="privacy-panel">
          <p class="privacy-title">Privacy note</p>
          <p>Your scan opens this page. The owner’s real number is kept off the QR code.</p>
        </div>
      </section>
    </main>
  
    </body>
  </html>
